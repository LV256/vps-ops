name: Change VPS IP

on:
  workflow_dispatch:

jobs:
  change-ip:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass python3-pip
          pip3 install tencentcloud-sdk-python --quiet

      - name: Allocate and bind new EIP + restart SS
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          VPS_PASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, subprocess, sys
          from tencentcloud.common import credential
          from tencentcloud.vpc.v20170312 import vpc_client, models as vpc_models

          secret_id = os.environ["TENCENT_SECRET_ID"]
          secret_key = os.environ["TENCENT_SECRET_KEY"]
          vps_pass = os.environ["VPS_PASS"]
          cred = credential.Credential(secret_id, secret_key)
          region = "ap-seoul"
          instance_id = "ins-2rolbm5x"
          vpc = vpc_client.VpcClient(cred, region)

          print("=== Allocating new EIP ===", flush=True)
          alloc_req = vpc_models.AllocateAddressesRequest()
          alloc_req.AddressCount = 1
          alloc_req.InternetChargeType = "TRAFFIC_POSTPAID_BY_HOUR"
          alloc_resp = vpc.AllocateAddresses(alloc_req)
          alloc_data = json.loads(alloc_resp.to_json_string())
          new_ip = alloc_data["AddressSet"][0]["AddressIp"]
          new_eip_id = alloc_data["AddressSet"][0]["AddressId"]
          print(f"New EIP: {new_eip_id} -> {new_ip}", flush=True)

          print(f"=== Binding to {instance_id} ===", flush=True)
          assoc_req = vpc_models.AssociateAddressRequest()
          assoc_req.AddressId = new_eip_id
          assoc_req.InstanceId = instance_id
          vpc.AssociateAddress(assoc_req)
          print("Bound!", flush=True)

          print(f"=== Waiting for SSH ===", flush=True)
          time.sleep(20)
          
          with open("/tmp/vps_pass", "w") as f:
              f.write(vps_pass)
          
          for i in range(1, 15):
              result = subprocess.run([
                  "sshpass", "-f", "/tmp/vps_pass", "ssh",
                  "-o", "StrictHostKeyChecking=accept-new",
                  "-o", "ConnectTimeout=5",
                  f"ubuntu@{new_ip}", "echo OK"
              ], capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"SSH OK after {i*5}s", flush=True)
                  break
              print(f"Waiting... ({i*5}s)", flush=True)
              time.sleep(5)
          else:
              print("ERROR: SSH never came up", flush=True)
              sys.exit(1)

          print(f"=== Restarting SS ===", flush=True)
          cmds = [
              "sudo pkill -9 ss-server 2>/dev/null || true",
              "sleep 1",
              "sudo systemctl reset-failed shadowsocks-libev 2>/dev/null || true",
              "sudo systemctl start shadowsocks-libev",
              "sleep 1",
              "sudo systemctl status shadowsocks-libev --no-pager | head -5",
              "sudo ss -tlnp | grep 3456",
          ]
          for cmd in cmds:
              subprocess.run([
                  "sshpass", "-f", "/tmp/vps_pass", "ssh",
                  "-o", "StrictHostKeyChecking=accept-new",
                  "-o", "ConnectTimeout=10",
                  f"ubuntu@{new_ip}", cmd
              ])

          os.unlink("/tmp/vps_pass")
          print(f"\n{'='*50}", flush=True)
          print(f"NEW VPS IP: {new_ip}", flush=True)
          print(f"Shadowrocket -> {new_ip}:3456", flush=True)
          print(f"{'='*50}", flush=True)
          PYEOF
