name: Restart VPS Proxy

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Force restart Shadowsocks
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          echo "${{ secrets.VPS_PASSWORD }}" > /tmp/vps_pass
          
          sshpass -f /tmp/vps_pass ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 ubuntu@150.109.247.58 '
            echo "=== Killing old SS process ==="
            sudo pkill -9 ss-server 2>/dev/null || true
            sleep 1
            echo "=== Starting SS fresh ==="
            sudo systemctl reset-failed shadowsocks-libev 2>/dev/null || true
            sudo systemctl start shadowsocks-libev 2>&1
            sleep 1
            echo "=== Status ==="
            sudo systemctl status shadowsocks-libev --no-pager 2>&1 | head -8
            echo "=== Ports ==="
            sudo ss -tlnp 2>&1 | grep 3456
            echo "=== Recent logs ==="
            sudo journalctl -u shadowsocks-libev --no-pager -n 10 2>&1
          ' 2>&1
          
          rm -f /tmp/vps_pass

      - name: Restart SS on second IP (43.132)
        run: |
          echo "${{ secrets.VPS_PASSWORD }}" > /tmp/vps_pass
          sshpass -f /tmp/vps_pass ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 ubuntu@43.132.141.61 '
            echo "=== 43.132: Killing old SS ==="
            sudo pkill -9 ss-server 2>/dev/null || true
            sleep 1
            sudo systemctl reset-failed shadowsocks-libev 2>/dev/null || true
            sudo systemctl start shadowsocks-libev 2>&1
            sleep 1
            echo "=== 43.132 Status ==="
            sudo systemctl status shadowsocks-libev --no-pager 2>&1 | head -5
          ' 2>&1 || echo "43.132 unreachable (may be same machine)"
          rm -f /tmp/vps_pass
