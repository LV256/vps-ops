name: Setup SSH Port 443

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH port 443 on VPS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          echo "${{ secrets.VPS_PASSWORD }}" > /tmp/vps_pass
          
          sshpass -f /tmp/vps_pass ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 ubuntu@150.109.247.58 '
            if ! grep -q "^Port 443" /etc/ssh/sshd_config; then
              echo "Adding Port 443..."
              sudo sed -i "/^Port 22/i Port 443" /etc/ssh/sshd_config
            else
              echo "Port 443 already configured"
            fi
            echo "=== Restarting sshd ==="
            sudo systemctl restart sshd 2>&1
            echo "=== SSH ports ==="
            sudo ss -tlnp 2>&1 | grep sshd
          ' 2>&1
          
          rm -f /tmp/vps_pass
