name: Restart VPS Proxy

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart Shadowsocks on VPS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          echo "${{ secrets.VPS_PASSWORD }}" > /tmp/vps_pass
          
          sshpass -f /tmp/vps_pass ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 ubuntu@150.109.247.58 '
            echo "=== Stopping SS ==="
            sudo systemctl stop shadowsocks-libev 2>&1 || true
            sleep 1
            echo "=== Starting SS ==="
            sudo systemctl start shadowsocks-libev 2>&1
            echo "=== Status ==="
            sudo systemctl status shadowsocks-libev --no-pager 2>&1 | head -10
            echo "=== Ports ==="
            sudo ss -tlnp 2>&1 | grep -E "sshd|3456"
          ' 2>&1
          
          rm -f /tmp/vps_pass
